      <circle cx="255" cy="82" r="3"/><circle cx="696" cy="575" r="4"/><circle cx="62" cy="548" r="3"/>
    </g>
  </g>

  <g transform="translate(285 42)">
    <path d="M115 202c-32-20-47-58-39-97 11-54 57-92 112-92 59 0 106 42 113 99 6 45-14 82-50 102-16-17-44-32-70-32-29 0-51 7-66 20z" fill="#17102b" stroke="#ff4eb8" stroke-width="6" filter="url(#glow)"/>
    <ellipse cx="188" cy="139" rx="82" ry="91" fill="url(#skin)" stroke="#5de7ff" stroke-width="5"/>
    <path d="M109 121c13-73 62-101 124-84 34 9 61 38 67 70-24-24-49-34-80-34-51 0-74 19-111 48z" fill="#201235"/>
