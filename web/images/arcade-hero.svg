      <rect x="15" y="15" width="194" height="136" rx="10" fill="url(#tablet)"/>
      <path d="M38 55h58l14-27 24 68 21-44 15 3h21" fill="none" stroke="#4036a6" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="78" cy="118" r="13" fill="#ff4eb8"/>
      <rect x="101" y="108" width="72" height="8" rx="4" fill="#4036a6"/>
      <rect x="101" y="124" width="48" height="8" rx="4" fill="#4036a6" opacity=".7"/>
