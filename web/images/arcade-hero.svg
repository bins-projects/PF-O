    <path d="M173 225v49h63v-50" fill="url(#skin)" stroke="#5de7ff" stroke-width="4"/>

    <path d="M94 293c42-32 82-45 126-45 50 0 101 18 147 54l57 268H27z" fill="url(#scrubs)" stroke="#63efff" stroke-width="7" filter="url(#glow)"/>
    <path d="M166 257l53 70 57-70" fill="#d8fbff" opacity=".9"/>
    <path d="M219 327v98" stroke="#172846" stroke-width="7"/>
