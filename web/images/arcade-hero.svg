<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">Retro futuristic nursing student illustration</title>
  <desc id="desc">A stylized nursing student holding a glowing tablet, surrounded by medical and study symbols.</desc>
  <defs>
    <linearGradient id="scrubs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#29d7ff"/>
      <stop offset="0.55" stop-color="#7663ff"/>
      <stop offset="1" stop-color="#ff4eb8"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.5" stop-color="#7eeaff"/>
      <stop offset="1" stop-color="#9f7cff"/>
    </linearGradient>
    <radialGradient id="skin" cx="35%" cy="25%" r="80%">
      <stop offset="0" stop-color="#ffd8c6"/>
      <stop offset="1" stop-color="#c98178"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <ellipse cx="505" cy="618" rx="295" ry="48" fill="#33d8ff" opacity=".2" filter="url(#soft)"/>
  <circle cx="675" cy="220" r="150" fill="#8a4dff" opacity=".18" filter="url(#soft)"/>
  <circle cx="280" cy="370" r="110" fill="#ff3fa6" opacity=".14" filter="url(#soft)"/>

  <g opacity=".7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 252h116l25-52 38 119 42-87 35 20h78" stroke="#44e7ff" stroke-width="8" filter="url(#glow)"/>
    <path d="M572 120h88l20-34 30 82 31-56 25 8h82" stroke="#ff56c7" stroke-width="7" filter="url(#glow)"/>
  </g>

  <g opacity=".78" filter="url(#glow)">
